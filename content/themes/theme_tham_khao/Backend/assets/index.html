<!DOCTYPE html>

<head>

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom styles for better spacing */
    .field-wrapper {
      margin-bottom: 1rem;
    }

    .field-wrapper:last-child {
      margin-bottom: 0;
    }

    /* Editor.js styles */
    .codex-editor {
      border: 1px solid #e2e8f0;
      border-radius: 6px;
    }

    .codex-editor__redactor {
      padding: 12px;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #c1c1c1;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #a8a8a8;
    }

    /* Loading spinner */
    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    /* DND Kit specific styles */
    .repeater-item {
      transition: all 0.2s ease;
    }

    .repeater-handle {
      cursor: grab;
    }

    .repeater-handle:active {
      cursor: grabbing;
    }

    .flexible-layout-selector {
      max-height: 300px;
      overflow-y: auto;
    }

    /* DND Kit drag overlay styles */
    .dnd-overlay {
      opacity: 0.8;
      transform: rotate(5deg);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }
  </style>

  <!-- PHP sẽ tạo form wrapper này -->
  <form id="acf-form" method="post" action="" enctype="multipart/form-data">
    <!-- PHP sẽ thêm các hidden fields cần thiết -->
    <input type="hidden" name="post_id" value="" />
    <input type="hidden" name="post_type" value="" />
    <input type="hidden" name="nonce" value="" />

    <!-- React app container - Chỉ render fields -->
    <div id="initial-loading" style="
          display: flex;
          justify-content: center;
          align-items: center;
          height: 200px;
          flex-direction: column;
        ">
      <div class="loading-spinner"></div>
      <p style="margin-top: 10px; color: #666">Loading ACF Form Builder...</p>
      <p style="margin-top: 5px; color: #999; font-size: 12px" id="initial-loading-content">
        Initializing drag & drop components...
      </p>
    </div>
    <div id="root">
      <!-- Initial loading state -->
    </div>

    <!-- PHP sẽ tạo submit buttons -->
    <div class="form-actions" style="
          margin-top: 2rem;
          padding: 1.5rem;
          background: white;
          border-radius: 8px;
          border: 1px solid #e5e7eb;
          display: block;
        ">
      <div style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
          ">
        <div style="
              font-size: 0.875rem;
              color: #6b7280;
              display: flex;
              justify-content: space-between;
              align-items: center;
              flex-wrap: wrap;
              gap: 1rem;
            ">
          <label for="last-updated-input" style="margin-right: 0.5rem" data-translate="Update time:">Update
            time:</label>
          <input type="datetime-local" id="last-updated-input" name="last_updated" style="
                border: 1px solid #d1d5db;
                border-radius: 6px;
                padding: 0.25rem 0.5rem;
                font-size: 0.95em;
                color: #374151;
                background: #fff;
                margin-right: 1.5rem;
              " />
          <label for="post-status-input" style="margin-right: 0.5rem" data-translate="Status:">Status:</label>
          <select id="post-status-input" name="post_status" style="
                border: 1px solid #d1d5db;
                border-radius: 6px;
                padding: 0.25rem 0.5rem;
                font-size: 0.95em;
                color: #374151;
                background: #fff;
              ">
            <option value="draft" data-translate="Draft">Draft</option>
            <option value="published" data-translate="Published">
              Published
            </option>
            <option value="pending" data-translate="Pending">Pending</option>
            <option value="archived" data-translate="Archived">
              Archived
            </option>
          </select>
        </div>
        <div style="display: flex; gap: 0.5rem">
          <button type="submit" name="action" value="save_draft" id="save-draft-btn" style="
                padding: 0.5rem 1rem;
                border: 1px solid #d1d5db;
                background: white;
                border-radius: 6px;
                font-size: 0.875rem;
                cursor: pointer;
                transition: all 0.2s ease;
              " onmouseover="this.style.backgroundColor='#f9fafb'" onmouseout="this.style.backgroundColor='white'"
            data-translate="Save Draft">
            💾 Save Draft
          </button>
          <button type="submit" name="action" value="publish" id="publish-btn" style="
                padding: 0.5rem 1.5rem;
                background: #3b82f6;
                color: white;
                border: none;
                border-radius: 6px;
                font-size: 0.875rem;
                cursor: pointer;
                font-weight: 500;
                transition: all 0.2s ease;
              " onmouseover="this.style.backgroundColor='#2563eb'" onmouseout="this.style.backgroundColor='#3b82f6'"
            data-translate="Publish">
            🚀 Publish
          </button>
        </div>
      </div>
    </div>
  </form>
